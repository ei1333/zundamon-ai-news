<!DOCTYPE html>
<html lang="ja">
  <head>
{head_html}
  </head>
  <body>
    <main class="container">
      <header class="hero hero-with-character">
        <div class="hero-copy">
          <p class="eyebrow">{hero_eyebrow}</p>
          <h1>{hero_title}</h1>
          <p class="lead">
            {hero_lead}
          </p>
        </div>
        <div class="hero-character">
          <img src="assets/characters/zundamon-standing.png" alt="ずんだもんの立ち絵" />
        </div>
      </header>

      {featured_html}

      <section class="card filter-card">
        <h2>テーマで絞り込み</h2>
        <div class="theme-filters" role="group" aria-label="テーマで絞り込み">
{theme_filters_html}
        </div>
      </section>

      <section class="card" data-filter-section="recent">
        <h2 data-recent-heading>{recent_heading}</h2>
        <div class="episode-grid" data-recent-grid>
{recent_html}
        </div>
      </section>

      <section class="card" data-filter-section="backnumber">
        <h2 data-backnumber-heading>{backnumber_heading}</h2>
        <ul class="backnumber-list" data-backnumber-list>
{backnumber_html}
        </ul>
      </section>

      <section class="card">
        <h2>{credits_heading}</h2>
        <p>{credits_voice}</p>
      </section>

    </main>
    <script>
      (() => {{
        const buttons = [...document.querySelectorAll('[data-theme-filter]')];
        const recentCards = [...document.querySelectorAll('[data-recent-grid] .episode-card')];
        const backnumberItems = [...document.querySelectorAll('[data-backnumber-list] > li')];
        const recentHeading = document.querySelector('[data-recent-heading]');
        const backnumberHeading = document.querySelector('[data-backnumber-heading]');
        const recentLimit = 4;
        if (!buttons.length || !recentCards.length || !backnumberItems.length) return;

        const headingLabel = (theme) => {{
          if (theme === 'all') return '最近の回';
          const button = buttons.find((item) => item.dataset.themeFilter === theme);
          return button ? `${{button.textContent}}の最近の回` : '最近の回';
        }};

        const backnumberLabel = (theme) => {{
          if (theme === 'all') return 'バックナンバー';
          const button = buttons.find((item) => item.dataset.themeFilter === theme);
          return button ? `${{button.textContent}}のバックナンバー` : 'バックナンバー';
        }};

        const applyFilter = (theme) => {{
          for (const button of buttons) {{
            const active = button.dataset.themeFilter === theme;
            button.setAttribute('aria-pressed', active ? 'true' : 'false');
            button.classList.toggle('is-active', active);
          }}

          let shownRecent = 0;
          for (const card of recentCards) {{
            const match = theme === 'all' || card.dataset.episodeTheme === theme;
            const visible = match && shownRecent < recentLimit;
            card.hidden = !visible;
            if (visible) shownRecent += 1;
          }}

          let skippedRecent = 0;
          for (const item of backnumberItems) {{
            const match = theme === 'all' || item.dataset.episodeTheme === theme;
            let visible = false;
            if (match) {{
              if (skippedRecent < recentLimit) {{
                skippedRecent += 1;
              }} else {{
                visible = true;
              }}
            }}
            item.hidden = !visible;
          }}

          if (recentHeading) recentHeading.textContent = headingLabel(theme);
          if (backnumberHeading) backnumberHeading.textContent = backnumberLabel(theme);
        }};

        for (const button of buttons) {{
          button.addEventListener('click', () => applyFilter(button.dataset.themeFilter || 'all'));
        }}

        applyFilter('all');
      }})();
    </script>
  </body>
</html>
