      <section class="card featured-card" data-episode-theme="{theme_name_attr}">
        <div class="featured-copy">
          <p class="eyebrow">最新エピソード</p>
          <h2>最新回</h2>
          <div class="featured-meta">
            <span class="featured-duration">▶ 1 min</span>
            <span class="featured-date-label">{date} </span>
            <span class="theme-label">テーマ: {theme_label}</span>
          </div>
          <div class="episode-tags">
{tags_html}
          </div>
          <ul class="featured-headlines">
{headlines_html}
          </ul>
          <audio class="featured-audio" controls preload="none">
            <source src="assets/audio/sample-news-{date_attr}.wav" type="audio/wav" />
            お使いのブラウザは audio 要素に対応していません。
          </audio>
          <div class="featured-actions">
            <a class="button" href="days/{date_attr}.html">詳細を見る</a>
          </div>
        </div>
        <div class="featured-visual" aria-hidden="true">
          <div class="featured-badge">ON AIR</div>
          <div class="featured-screen">
            <div class="featured-logo">ずんだもん<span>1分AIニュース</span></div>
            <p class="featured-screen-date">{date}</p>
            <p class="featured-screen-title">{title}</p>
            <div class="featured-wave"></div>
          </div>
        </div>
      </section>
